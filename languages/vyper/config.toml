name = "Vyper"
grammar = "vyper"
path_suffixes = ["vy"]
line_comments = ["# "]
tab_size = 4
hard_tabs = false
autoclose_before = ";:.,=}])"
brackets = [
    { start = "(", end = ")", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "{", end = "}", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]
